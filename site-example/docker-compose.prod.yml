services:
  web:
    image: nginx:alpine
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.studyapp.rule=Host(`studyapp.do-bkend.click`)"
      - "traefik.http.routers.studyapp.entrypoints=websecure"
      - "traefik.http.routers.studyapp.tls.certresolver=letsencrypt"
      - "traefik.http.services.studyapp.loadbalancer.server.port=80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - default
      - traefik-public

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
      - ./keys:/var/www/html/keys
    environment:
      DB_HOST: db
      DB_NAME: drupal
      DB_USER: drupal
      DB_PASSWORD: ${DB_PASSWORD}
      HASH_SALT: ${HASH_SALT}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - db

  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: drupal
      MYSQL_USER: drupal
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
    external: true
    name: study-app_db_data

networks:
  traefik-public:
    external: true
